<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triangle Mesh</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #EDEDED;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    cursor: none;
  }

  canvas {
    display: block;
    position: fixed;
    top: 0; left: 0;
  }

  #cursor {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #171717;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 10;
    mix-blend-mode: difference;
    transition: transform 0.1s ease;
  }

  #hint {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.25);
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    pointer-events: none;
    z-index: 10;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="cursor"></div>
<div id="hint">move mouse to attract the mesh</div>

<script>
// ─── Delaunay triangulation (Bowyer–Watson) ───────────────────────────────────

function circumcircle(ax, ay, bx, by, cx, cy) {
  const D = 2 * (ax * (by - cy) + bx * (cy - ay) + cx * (ay - by));
  if (Math.abs(D) < 1e-10) return null;
  const ux = ((ax*ax + ay*ay) * (by - cy) + (bx*bx + by*by) * (cy - ay) + (cx*cx + cy*cy) * (ay - by)) / D;
  const uy = ((ax*ax + ay*ay) * (cx - bx) + (bx*bx + by*by) * (ax - cx) + (cx*cx + cy*cy) * (bx - ax)) / D;
  const r  = Math.hypot(ax - ux, ay - uy);
  return { x: ux, y: uy, r };
}

function delaunay(points) {
  const n = points.length;
  if (n < 3) return [];

  // super-triangle
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const p of points) {
    if (p.x < minX) minX = p.x; if (p.y < minY) minY = p.y;
    if (p.x > maxX) maxX = p.x; if (p.y > maxY) maxY = p.y;
  }
  const dx = maxX - minX, dy = maxY - minY;
  const dmax = Math.max(dx, dy) * 2;
  const mx = (minX + maxX) / 2, my = (minY + maxY) / 2;

  const sp = [
    { x: mx - dmax * 2,  y: my - dmax },
    { x: mx,             y: my + dmax * 2 },
    { x: mx + dmax * 2,  y: my - dmax },
  ];
  const all = [...points, ...sp];
  const si = n, sj = n + 1, sk = n + 2;

  let triangles = [{ i: si, j: sj, k: sk }];

  for (let p = 0; p < n; p++) {
    const px = all[p].x, py = all[p].y;
    const edges = [];

    triangles = triangles.filter(t => {
      const c = circumcircle(all[t.i].x, all[t.i].y, all[t.j].x, all[t.j].y, all[t.k].x, all[t.k].y);
      if (!c) return true;
      if (Math.hypot(px - c.x, py - c.y) < c.r + 1e-8) {
        edges.push([t.i, t.j], [t.j, t.k], [t.k, t.i]);
        return false;
      }
      return true;
    });

    // remove duplicate edges
    const unique = [];
    outer: for (let e = 0; e < edges.length; e++) {
      for (let f = 0; f < edges.length; f++) {
        if (e !== f &&
            ((edges[e][0] === edges[f][0] && edges[e][1] === edges[f][1]) ||
             (edges[e][0] === edges[f][1] && edges[e][1] === edges[f][0]))) {
          continue outer;
        }
      }
      unique.push(edges[e]);
    }
    for (const [a, b] of unique) triangles.push({ i: a, j: b, k: p });
  }

  // remove triangles touching super-triangle vertices
  return triangles.filter(t => t.i < n && t.j < n && t.k < n);
}

// ─── Point generation ─────────────────────────────────────────────────────────

const ACCENT   = '#FFFF05';
const W        = window.innerWidth;
const H        = window.innerHeight;

// Base grid: loosely Poisson-disc-like using a jittered grid
function generateBasePoints(w, h, baseSpacing) {
  const pts = [];
  const cols = Math.ceil(w / baseSpacing) + 2;
  const rows = Math.ceil(h / baseSpacing) + 2;
  for (let r = -1; r <= rows; r++) {
    for (let c = -1; c <= cols; c++) {
      const jx = (Math.random() - 0.5) * baseSpacing * 0.85;
      const jy = (Math.random() - 0.5) * baseSpacing * 0.85;
      pts.push({
        bx: c * baseSpacing + jx,   // base position
        by: r * baseSpacing + jy,
        x:  c * baseSpacing + jx,   // animated position
        y:  r * baseSpacing + jy,
      });
    }
  }
  return pts;
}

// ─── Canvas setup ─────────────────────────────────────────────────────────────

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const cursorEl = document.getElementById('cursor');

let W2 = W, H2 = H;
canvas.width  = W2;
canvas.height = H2;

// ─── State ────────────────────────────────────────────────────────────────────

const BASE_SPACING = 95;  // loose background grid size
const ATTRACT_R    = 260; // radius of mouse influence
const ATTRACT_STR  = 0.58; // how strongly points pull toward mouse (0–1)

let mouse = { x: W2 / 2, y: H2 / 2 };
let targetMouse = { x: W2 / 2, y: H2 / 2 };

// Base points (static jitter grid)
let basePoints = generateBasePoints(W2, H2, BASE_SPACING);


// ─── Animation loop ───────────────────────────────────────────────────────────

let frameId;
let lastTime = 0;

function lerp(a, b, t) { return a + (b - a) * t; }

function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

function draw(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  // smooth mouse
  mouse.x = lerp(mouse.x, targetMouse.x, 1 - Math.pow(0.04, dt));
  mouse.y = lerp(mouse.y, targetMouse.y, 1 - Math.pow(0.04, dt));

  // attract base points toward mouse
  for (const p of basePoints) {
    const dx = mouse.x - p.bx;
    const dy = mouse.y - p.by;
    const dist = Math.hypot(dx, dy);
    const influence = Math.max(0, 1 - dist / ATTRACT_R);
    const t = easeOut(influence) * ATTRACT_STR;
    const tx = p.bx + dx * t;
    const ty = p.by + dy * t;
    p.x = lerp(p.x, tx, 1 - Math.pow(0.04, dt));
    p.y = lerp(p.y, ty, 1 - Math.pow(0.04, dt));
  }

  // combine all points for triangulation
  const pts = [...basePoints];

  // run Delaunay
  const tris = delaunay(pts);

  // draw
  ctx.clearRect(0, 0, W2, H2);
  ctx.fillStyle = '#EDEDED';
  ctx.fillRect(0, 0, W2, H2);

  for (const t of tris) {
    const ax = pts[t.i].x, ay = pts[t.i].y;
    const bx = pts[t.j].x, by = pts[t.j].y;
    const cx = pts[t.k].x, cy = pts[t.k].y;

    // centroid distance from mouse → color/opacity
    const centX = (ax + bx + cx) / 3;
    const centY = (ay + by + cy) / 3;
    const dist   = Math.hypot(centX - mouse.x, centY - mouse.y);
    const fadeR  = W2 * 0.5; // 50% of screen width
    const linear = Math.max(0, 1 - dist / fadeR);
    const prox   = Math.pow(linear, 4); // fast falloff beyond ~100px

    // stroke color: fade from invisible → dark near cursor
    const alpha = lerp(0, 0.55, prox);

    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(bx, by);
    ctx.lineTo(cx, cy);
    ctx.closePath();

    // fill: accent yellow, full opacity at cursor → 0% far away
    ctx.fillStyle = `rgba(255,255,5,${prox})`;
    ctx.fill();

    ctx.strokeStyle = `rgba(23,23,23,${alpha})`;
    ctx.lineWidth   = lerp(0.3, 0.8, prox);
    ctx.stroke();
  }

  // draw only the single closest dot within threshold
  const DOT_THRESHOLD = 100; // px — only show dot if cursor is within this distance
  let closestDist = Infinity, closestPt = null;
  for (const p of pts) {
    const d = Math.hypot(p.x - mouse.x, p.y - mouse.y);
    if (d < closestDist) { closestDist = d; closestPt = p; }
  }
  if (closestPt && closestDist < DOT_THRESHOLD) {
    const fade = Math.max(0, 1 - closestDist / DOT_THRESHOLD);
    ctx.beginPath();
    ctx.arc(closestPt.x, closestPt.y, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(23,23,23,${fade * 0.8})`;
    ctx.fill();
  }

  frameId = requestAnimationFrame(draw);
}

// ─── Events ───────────────────────────────────────────────────────────────────

window.addEventListener('mousemove', e => {
  targetMouse.x = e.clientX;
  targetMouse.y = e.clientY;
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top  = e.clientY + 'px';
});

window.addEventListener('resize', () => {
  W2 = window.innerWidth;
  H2 = window.innerHeight;
  canvas.width  = W2;
  canvas.height = H2;
  basePoints = generateBasePoints(W2, H2, BASE_SPACING);
});

// kick off
requestAnimationFrame(ts => { lastTime = ts; draw(ts); });
</script>
</body>
</html>
